<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>暗黑4死灵法师装备指引</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero hero--compact">
      <div class="hero__scrim"></div>
      <div class="hero__content">
        <p class="eyebrow">暗黑破坏神 4 · 死灵法师</p>
        <h1>主流流派装备指引</h1>
        <p class="hero__copy">选择一个流派，查看每个部位该穿什么、威能是什么、去哪里刷。</p>
      </div>
    </header>

    <main class="simple-app">
      <section class="build-picker" aria-labelledby="builds-title">
        <p class="section-kicker">Builds</p>
        <h2 id="builds-title">选择流派</h2>
        <div class="build-buttons" id="buildList"></div>
      </section>

      <article class="build-panel" id="buildDetail" aria-live="polite"></article>

      <section class="sources simple-sources" aria-labelledby="sources-title">
        <p class="section-kicker">Sources</p>
        <h2 id="sources-title">资料来源</h2>
        <ul id="sourceList"></ul>
      </section>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
